services:
  mermaid:
    image: ghcr.io/mermaid-js/mermaid-live-editor:latest
    container_name: mermaid-live-editor
    restart: always
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mermaid.rule=Host(`mermaid.arch-services.mywire.org`)"
      - "traefik.http.routers.mermaid.entrypoints=websecure"
      - "traefik.http.routers.mermaid.tls=true"
      - "traefik.http.routers.mermaid.service=mermaid-svc"
      - "traefik.http.routers.mermaid-red.rule=Host(`mermaid.arch-services.mywire.org`)"
      - "traefik.http.routers.mermaid-red.entrypoints=web"
      - "traefik.http.routers.mermaid-red.middlewares=https-redirect@docker"

      - "traefik.http.services.mermaid-svc.loadbalancer.server.port=8080"


networks:
  proxy-net:
    external: true
