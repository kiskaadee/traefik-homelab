services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: socket-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - IMAGES=1
      - VOLUMES=1
      - POST=1
      - DELETE=1
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
      - VERSION=1
      - INFO=1
      - EVENTS=1
      - PING=1
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EXEC=0
      - NODES=0
      - PLUGINS=0
      - SECRETS=0
      - SWARM=0
      - SYSTEM=0
    networks:
      - socket-net

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    depends_on:
      - socket-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DYNU_API_KEY=${DYNU_API_KEY}
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global TLS defaults for websecure
      - "--entrypoints.websecure.http.tls.certResolver=myresolver"
      - "--entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN}"
      # SSL Setup
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=dynu"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - ./config/letsencrypt:/letsencrypt
    networks:
      - socket-net
      - proxy-net
    labels:
      - "traefik.enable=true"
      
      # Middleware: Redirect to HTTPS
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

      # Middleware: Authelia Guard
      - "traefik.http.middlewares.authelia-auth.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.${DOMAIN}/"
      - "traefik.http.middlewares.authelia-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia-auth.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Email,Remote-Name"

      # Dashboard - Public (HTTPS)
      - "traefik.http.routers.traefik-dash.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dash.entrypoints=websecure"
      - "traefik.http.routers.traefik-dash.tls=true"
      - "traefik.http.routers.traefik-dash.service=api@internal"
      - "traefik.http.routers.traefik-dash.middlewares=authelia-auth@docker"
      
      # Dashboard - Public (Redirect)
      - "traefik.http.routers.traefik-dash-red.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dash-red.entrypoints=web"
      - "traefik.http.routers.traefik-dash-red.middlewares=https-redirect@docker"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: always
    volumes:
      - ./config/authelia:/config
      - /run/secrets/users.yml:/config/users.yml:ro
    environment:
      - DOMAIN=${DOMAIN}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
      - X_AUTHELIA_CONFIG_FILTERS=template
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      # Public (HTTPS)
      - "traefik.http.routers.authelia.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      # Public (Redirect)
      - "traefik.http.routers.authelia-red.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authelia-red.entrypoints=web"
      - "traefik.http.routers.authelia-red.middlewares=https-redirect@docker"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    command: -H tcp://socket-proxy:2375
    volumes:
      - portainer_data:/data
    networks:
      - socket-net
      - proxy-net
    labels:
      - "traefik.enable=true"
      # Public (HTTPS)
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.middlewares=authelia-auth@docker"
      - "traefik.http.routers.portainer.service=portainer-svc"
      # Public (Redirect)
      - "traefik.http.routers.portainer-red.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer-red.entrypoints=web"
      - "traefik.http.routers.portainer-red.middlewares=https-redirect@docker"
      - "traefik.http.services.portainer-svc.loadbalancer.server.port=9000"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
    networks:
      - proxy-net
      - socket-net
    labels:
      - "traefik.enable=true"
      # Public (HTTPS)
      - "traefik.http.routers.logs.rule=Host(`logs.${DOMAIN}`)"
      - "traefik.http.routers.logs.entrypoints=websecure"
      - "traefik.http.routers.logs.tls=true"
      - "traefik.http.routers.logs.middlewares=authelia-auth@docker"
      - "traefik.http.routers.logs.service=logs-svc"
      # Public (Redirect)
      - "traefik.http.routers.logs-red.rule=Host(`logs.${DOMAIN}`)"
      - "traefik.http.routers.logs-red.entrypoints=web"
      - "traefik.http.routers.logs-red.middlewares=https-redirect@docker"
      - "traefik.http.services.logs-svc.loadbalancer.server.port=8080"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
    networks:
      - socket-net

  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: always
    command: serve
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=20
      - DIUN_WATCH_SCHEDULE=0 */6 * * *
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_ENDPOINT=tcp://socket-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
    volumes:
      - ./config/diun:/data
    networks:
      - socket-net

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: always
    volumes:
      - ./config/homepage:/app/config
      - /home:/home:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${DOMAIN}
    networks:
      - proxy-net
      - socket-net
    labels:
      - "traefik.enable=true"
      # Public (HTTPS)
      - "traefik.http.routers.homepage.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.service=homepage-svc"
      # Public (Redirect)
      - "traefik.http.routers.homepage-red.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.homepage-red.entrypoints=web"
      - "traefik.http.routers.homepage-red.middlewares=https-redirect@docker"
      - "traefik.http.services.homepage-svc.loadbalancer.server.port=3000"

networks:
  proxy-net:
    external: true
  socket-net:
    external: true

volumes:
  portainer_data:
